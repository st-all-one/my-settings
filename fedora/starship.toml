# Não pula linha ao abrir o terminal
add_newline = false

format = """$git_branch$git_status$directory$character"""

[directory]
# Mostra o caminho relativo ao repositório ou home
truncation_length = 3
truncation_symbol = "…/"
style = "bold blue"
format = " [$path]($style) "

[git_branch]
symbol = ""
style = "bold yellow"
format = "($style$branch$symbol)"

[git_status]
style = "bold yellow"
# Substituímos os ícones pesados por símbolos simples
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
up_to_date = ""
untracked = "*"
stashed = "$"
modified = "*"
staged = "+"
renamed = "»"
deleted = "✘"
format = "$all_status$dots"

[character]
success_symbol = " [>](bold white) "
error_symbol = " [x](bold red) "
